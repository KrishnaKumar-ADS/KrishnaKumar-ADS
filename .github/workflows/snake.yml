name: Generate Animations

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# ✅ Fix: Grant write permissions to the workflow
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: KrishnaKumar-ADS
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Generate Pac-Man SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: KrishnaKumar-ADS
          outputs: |
            dist/pacman.svg?renderer=pacman
            dist/pacman-dark.svg?renderer=pacman&palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
